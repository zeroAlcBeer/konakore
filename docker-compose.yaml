version: "2"
services:
  server:
    image: cheerchen37/konakore-web
    restart: always
    volumes:
      - /mnt/hd1/Wallpaper:/wallpaper
      - /opt/konakore:/assets
    ports:
      - "7079:80"
    environment:
      wpath: "/wallpaper"
      dsn: "root:please_change@tcp(192.168.0.110:3306)/konakore?charset=utf8mb4&parseTime=True&loc=Local"
    container_name: konakore-web
  syncer:
    image: cheerchen37/konakore-syncer
    restart: always
    environment:
      dsn: "root:please_change@tcp(192.168.0.110:3306)/konakore?charset=utf8mb4&parseTime=True&loc=Local"
      spec_update_tag: "0 0 * * *"
      spec_newest_post: "0 * * * *"
      spec_oldest_post: "*/5 * * * *"
    container_name: konakore-syncer

